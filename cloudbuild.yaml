steps:
  # Pull the previous image so its layers seed the build cache below.
  # First ever build (no :latest yet) is a harmless no-op thanks to `|| true`.
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull europe-west2-docker.pkg.dev/stockport-badminton-map/league-site/app:latest || true

  # --cache-from reuses the pulled image's layers. Because the Dockerfile copies
  # package*.json + runs `npm ci` before copying source, the (slow) dependency
  # layer is skipped whenever package*.json is unchanged.
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from'
      - 'europe-west2-docker.pkg.dev/stockport-badminton-map/league-site/app:latest'
      - '-t'
      - 'europe-west2-docker.pkg.dev/stockport-badminton-map/league-site/app:$COMMIT_SHA'
      - '-t'
      - 'europe-west2-docker.pkg.dev/stockport-badminton-map/league-site/app:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'europe-west2-docker.pkg.dev/stockport-badminton-map/league-site/app'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'league-site'
      - '--image'
      - 'europe-west2-docker.pkg.dev/stockport-badminton-map/league-site/app:$COMMIT_SHA'
      - '--region'
      - 'europe-west2'
      - '--platform'
      - 'managed'
      - '--project'
      - 'stockport-badminton-map'

images:
  - 'europe-west2-docker.pkg.dev/stockport-badminton-map/league-site/app:$COMMIT_SHA'
  - 'europe-west2-docker.pkg.dev/stockport-badminton-map/league-site/app:latest'
